<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takk | Growly Garden</title>
    <style>
        :root {
            --bg: #060806;
            --bg-soft: #0b120d;
            --panel: rgba(11, 17, 13, 0.88);
            --panel-strong: rgba(14, 22, 17, 0.96);
            --text: #f2f4ef;
            --muted: #a1aba2;
            --line: rgba(169, 198, 173, 0.12);
            --accent: #86c996;
            --accent-soft: rgba(134, 201, 150, 0.12);
            --shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
            margin: 0;
        }

        body {
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 12% 18%, rgba(52, 103, 62, 0.22), transparent 24%),
                radial-gradient(circle at 84% 78%, rgba(52, 103, 62, 0.16), transparent 22%),
                linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 100%);
        }

        .card {
            width: min(100%, 520px);
            padding: 28px;
            border: 1px solid var(--line);
            border-radius: 22px;
            background: linear-gradient(180deg, var(--panel-strong) 0%, var(--panel) 100%);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .kicker {
            display: inline-flex;
            margin: 0 0 14px;
            padding: 10px 14px;
            border-radius: 999px;
            background: var(--accent-soft);
            border: 1px solid rgba(134, 201, 150, 0.14);
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            line-height: 1.06;
        }

        p {
            margin: 0 0 20px;
            color: var(--muted);
            line-height: 1.65;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            border-radius: 999px;
            background: var(--accent);
            color: #0a2514;
            text-decoration: none;
            font-size: 0.86rem;
            font-weight: 800;
            letter-spacing: 0.03em;
        }
    </style>
</head>
<body>
    <section class="card">
        <p class="kicker">Growly Garden</p>
        <h1>Takk for interessen</h1>
        <p>Registreringen din er sendt inn. Du hører fra oss når Growly Garden er klar for neste steg.</p>
        <a href="index.html">Tilbake til forsiden</a>
    </section>
</body>
</html>
